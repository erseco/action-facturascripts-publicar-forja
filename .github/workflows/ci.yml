---
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify dist is up to date
        run: |
          if ! git diff --quiet dist/; then
            echo "dist/ is stale. Run 'npm run build' and commit."
            git diff dist/
            exit 1
          fi
