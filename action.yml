name: 'FacturaScripts Forja Publisher'
description: 'Uploads a plugin ZIP as a new build on the FacturaScripts forja after a release.'
author: 'erseco'
branding:
  icon: upload-cloud
  color: blue

inputs:
  plugin-slug:
    description: 'Plugin slug on the forja (lowercase, e.g. "quickcreate", "aiscan").'
    required: true
  zip-path:
    description: 'Local path to the plugin ZIP produced by the release step.'
    required: true
  version:
    description: 'Version to attach to the build. Must be an integer ("7") or a single-decimal number ("7.1"). A leading "v" is stripped. Triple-dot and pre-release formats are rejected by FacturaScripts.'
    required: true
  forja-user:
    description: 'Forja username/email. Use a GitHub secret, never hardcode.'
    required: true
  forja-password:
    description: 'Forja password. Use a GitHub secret, never hardcode.'
    required: true
  forja-url:
    description: 'Base URL of the forja.'
    required: false
    default: 'https://facturascripts.com'
  status:
    description: 'Optional final status for the new build. One of "stable", "beta" or "0" (disabled). Defaults to whatever the forja assigns (usually "beta").'
    required: false
  dry-run:
    description: 'If true, login and fetch the CSRF token but do not POST the build.'
    required: false
    default: 'false'

outputs:
  build-id:
    description: 'Id of the newly created build on the forja.'
  build-version:
    description: 'Version stored on the forja (post-normalization).'
  build-url:
    description: 'URL to the plugin admin page (anchored to the new build modal when available).'
  build-status:
    description: 'Final status of the new build when the status input was set; empty otherwise.'

runs:
  using: 'node20'
  main: 'dist/index.cjs'
